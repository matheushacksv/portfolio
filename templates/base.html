{% load compress %}
{% load static %}


<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Porfólio - Matheus Hack{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    {% compress css %}
        <link rel="stylesheet" href="{% static 'src/output.css' %}">
    {% endcompress %}

</head>
<body class="min-h-screen bg-stone-300 font-['Inter'] selection:bg-blue-500/30 selection:text-blue-900">
    <div class="lg:p-6">
        <main class="w-full max-w-[1400px] mx-auto bg-[#F3F3F1] rounded-[2.5rem] shadow-2xl relative flex flex-col overflow-hidden min-h-[calc(100vh-3rem)]">
            
            <!-- Header/Nav -->
            {% include 'partials/_navbar.html' %}

            {% block content %}

            {% endblock %}
        </main>
    </div>

    <footer>
        {% include 'partials/_footer.html' %}
    </footer>

    <script>
        lucide.createIcons();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
    {% compress js %}
        <script type="module" src="{% static 'js/main.js' %}"></script>
    {% endcompress %}
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
</body>
</html>
